<!DOCTYPE html>
<html>
<head>
    <title>Applied Jobs</title>
    <style>
        :root {
            --bg: #f2f4f7;
            --card: #ffffff;
            --border: #e4e7ec;
            --text: #1a1d23;
            --muted: #6b7280;
            --accent: #4f46e5;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
            padding: 20px;
            margin-bottom: 28px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        th {
            color: var(--muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbfc; }
        a { color: var(--accent); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        .sl-column { width: 44px; text-align: center; color: var(--muted); }
        .sort-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 5px;
            font-size: 12px;
        }
        .sort-button:hover { color: var(--accent); }
        .applied-column { width: 70px; text-align: center; }
        .tick { color: #12b76a; font-weight: bold; font-size: 16px; }
        #live-root { margin-bottom: 28px; }
        .decision-card {
            background: #fffaeb;
            border: 1px solid #fec84b;
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 14px;
        }
        .decision-card strong { color: #b54708; }
        .decision-card button {
            margin-right: 8px;
            margin-top: 12px;
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .decision-card button:hover { background: #4338ca; }
        .decision-card button:disabled { opacity: 0.6; cursor: default; }
        .feed {
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .feed-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feed-item:last-child { border-bottom: none; }
        .feed-empty { padding: 24px; text-align: center; color: var(--muted); font-size: 13.5px; }
        .badge {
            flex-shrink: 0;
            display: inline-block;
            min-width: 68px;
            text-align: center;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #fff;
        }
        .badge-applying { background: #2970ff; }
        .badge-applied { background: #12b76a; }
        .badge-skipped { background: #98a2b3; }
        .badge-failed, .badge-error { background: #f04438; }
        .badge-info { background: #667085; }
        .badge-question { background: #9e77ed; }
        .badge-login_required, .badge-stuck_question, .badge-review_filters { background: #f79009; }
        .feed-message { flex: 1; }
        .feed-time { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟢 Live Bot Activity</h1>
        <div id="live-root"></div>

        <h1>📋 Applied Jobs History</h1>
        <div class="card">
            <table id="jobsTable">
                <thead>
                    <tr>
                        <th class="sl-column">#</th>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>HR Contact</th>
                        <th>
                            External Link
                            <button class="sort-button" onclick="sortByExternalLink()">↕️</button>
                        </th>
                        <th class="applied-column">Applied</th>
                    </tr>
                </thead>
                <tbody id="jobsBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function DecisionCard({ decision }) {
            const [sending, setSending] = useState(false);
            const respond = async (choice) => {
                setSending(true);
                await fetch(`/decision/${decision.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ choice }),
                });
            };
            return (
                <div className="decision-card">
                    <strong>Needs your input:</strong> {decision.message}
                    <div>
                        {(decision.options || []).map(opt => (
                            <button key={opt} disabled={sending} onClick={() => respond(opt)}>{opt}</button>
                        ))}
                    </div>
                </div>
            );
        }

        function FeedItem({ item }) {
            const kind = (item.kind || 'info').toLowerCase();
            return (
                <div className="feed-item">
                    <span className={`badge badge-${kind}`}>{kind}</span>
                    <span className="feed-message">{item.message}</span>
                    <span className="feed-time">{item.timestamp}</span>
                </div>
            );
        }

        function LiveDashboard() {
            const [data, setData] = useState({ log: [], pending: [] });

            useEffect(() => {
                const poll = () => {
                    fetch('/status').then(r => r.json()).then(setData).catch(() => {});
                };
                poll();
                const id = setInterval(poll, 1000);
                return () => clearInterval(id);
            }, []);

            const noPaddingCard = { padding: 0 };
            return (
                <div>
                    {data.pending.map(d => <DecisionCard key={d.id} decision={d} />)}
                    <div className="card" style={noPaddingCard}>
                        <div className="feed">
                            {data.log.length === 0
                                ? <div className="feed-empty">Waiting for activity…</div>
                                : data.log.map((item, i) => <FeedItem key={i} item={item} />)}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('live-root')).render(<LiveDashboard />);
    </script>

    <script>
        let sortOrder = 'asc';
        let jobsData = [];
        let appliedJobs = new Set();

        // Replace the createTableRow function with this updated version
        function createTableRow(job, index) {
            const row = document.createElement('tr');
            
            // Serial Number
            const slCell = document.createElement('td');
            slCell.textContent = index + 1;
            slCell.className = 'sl-column';
            row.appendChild(slCell);
            
            // Job Title with link
            const titleCell = document.createElement('td');
            const titleLink = document.createElement('a');
            titleLink.href = job.Job_Link;
            titleLink.textContent = job.Title;
            titleLink.target = '_blank';
            titleCell.appendChild(titleLink);
            row.appendChild(titleCell);
            
            // Company
            const companyCell = document.createElement('td');
            companyCell.textContent = job.Company;
            row.appendChild(companyCell);
            
            // HR Name with link
            const hrCell = document.createElement('td');
            if (job.HR_Name && job.HR_Name !== 'Unknown') {
                const hrLink = document.createElement('a');
                hrLink.href = job.HR_Link;
                hrLink.textContent = job.HR_Name;
                hrLink.target = '_blank';
                hrCell.appendChild(hrLink);
            } else {
                hrCell.textContent = 'N/A';
            }
            row.appendChild(hrCell);
            
            // External Job Link
            const extCell = document.createElement('td');
            const appliedCell = document.createElement('td');
            appliedCell.className = 'applied-column';

            if (job.External_Job_link === 'Easy Applied') {
                extCell.textContent = 'Easy Applied';
                appliedCell.innerHTML = '<span class="tick">✓</span>';
            } else if (job.External_Job_link) {
                const extLink = document.createElement('a');
                extLink.href = job.External_Job_link;
                extLink.textContent = 'External Link';
                extLink.target = '_blank';
                
                // Add click handler for external link
                extLink.addEventListener('click', async () => {
                    try {
                        const response = await fetch(`/applied-jobs/${job.Job_ID}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        });
                        
                        if (response.ok) {
                            appliedCell.innerHTML = '<span class="tick">✓</span>';
                            job.Date_Applied = new Date().toISOString();
                        }
                    } catch (error) {
                        console.error('Error updating applied date:', error);
                    }
                });
                
                extCell.appendChild(extLink);
                // Show tick if already applied
                if (job.Date_Applied !== 'Pending') {
                    appliedCell.innerHTML = '<span class="tick">✓</span>';
                }
            } else {
                extCell.textContent = 'N/A';
            }
            row.appendChild(extCell);
            row.appendChild(appliedCell);
            
            return row;
        }

        function sortByExternalLink() {
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            
            jobsData.sort((a, b) => {
                const valueA = a.External_Job_link || '';
                const valueB = b.External_Job_link || '';
                
                if (sortOrder === 'asc') {
                    return valueA.localeCompare(valueB);
                } else {
                    return valueB.localeCompare(valueA);
                }
            });
            
            const tbody = document.getElementById('jobsBody');
            tbody.innerHTML = '';
            jobsData.forEach((job, index) => {
                tbody.appendChild(createTableRow(job, index));
            });
        }

        fetch('/applied-jobs')
            .then(response => response.json())
            .then(jobs => {
                jobsData = jobs;
                const tbody = document.getElementById('jobsBody');
                jobs.forEach((job, index) => {
                    tbody.appendChild(createTableRow(job, index));
                });
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>
</html>
