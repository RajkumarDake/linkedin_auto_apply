<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LinkedIn Auto Applier — Dashboard</title>
    <style>
        :root {
            --surface: #fcfcfb;
            --page: #f9f9f7;
            --border: #e1e0d9;
            --ink: #0b0b0b;
            --ink-secondary: #52514e;
            --ink-muted: #898781;
            --accent: #2a78d6;
            --good: #0ca30c;
            --warning: #fab219;
            --serious: #ec835a;
            --critical: #d03b3b;
            --violet: #4a3aa7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --surface: #1a1a19;
                --page: #0d0d0d;
                --border: #2c2c2a;
                --ink: #ffffff;
                --ink-secondary: #c3c2b7;
                --ink-muted: #898781;
                --accent: #3987e5;
                --good: #0ca30c;
                --warning: #fab219;
                --serious: #ec835a;
                --critical: #e66767;
                --violet: #9085e9;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background: var(--page);
            color: var(--ink);
        }
        .container { max-width: 1140px; margin: 0 auto; padding: 28px 20px 60px; }

        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .topbar h1 { font-size: 19px; font-weight: 700; margin: 0; }
        .topbar .sub { color: var(--ink-secondary); font-size: 13px; margin-top: 2px; }
        .live-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 999px; padding: 6px 12px; font-size: 12.5px; font-weight: 600;
            color: var(--ink-secondary);
        }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--good);
            box-shadow: 0 0 0 0 rgba(12,163,12,0.5);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(12,163,12,0.45); }
            70%  { box-shadow: 0 0 0 6px rgba(12,163,12,0); }
            100% { box-shadow: 0 0 0 0 rgba(12,163,12,0); }
        }

        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-tile {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px 18px;
        }
        .stat-tile .label { font-size: 12px; color: var(--ink-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
        .stat-tile .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .stat-tile.applying .value { color: var(--accent); }
        .stat-tile.applied .value { color: var(--good); }
        .stat-tile.skipped .value { color: var(--ink-muted); }
        .stat-tile.failed .value { color: var(--critical); }

        h2 {
            font-size: 15px; font-weight: 700; margin: 0 0 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            box-shadow: 0 1px 3px rgba(11,11,11,0.05);
            padding: 18px; margin-bottom: 26px;
        }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13.5px; }
        th { color: var(--ink-muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; }
        tr:last-child td { border-bottom: none; }
        a { color: var(--accent); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        .sl-column { width: 40px; text-align: center; color: var(--ink-muted); font-variant-numeric: tabular-nums; }
        .sort-button { background: none; border: none; cursor: pointer; padding: 0 5px; font-size: 12px; color: var(--ink-muted); }
        .sort-button:hover { color: var(--accent); }
        .applied-column { width: 70px; text-align: center; }
        .tick { color: var(--good); font-weight: bold; font-size: 16px; }
        .empty-row td { text-align: center; color: var(--ink-muted); padding: 24px; }

        .decision-card {
            background: var(--surface); border: 1px solid var(--warning); border-left: 4px solid var(--warning);
            border-radius: 10px; padding: 16px 18px; margin-bottom: 14px;
        }
        .decision-card .label { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13px; margin-bottom: 4px; }
        .decision-card button {
            margin-right: 8px; margin-top: 12px; padding: 7px 16px; border: none; border-radius: 6px;
            background: var(--accent); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer;
        }
        .decision-card button:hover { filter: brightness(0.92); }
        .decision-card button:disabled { opacity: 0.6; cursor: default; }

        .feed { max-height: 380px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; }
        .feed-item { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13.5px; display: flex; align-items: center; gap: 10px; }
        .feed-item:last-child { border-bottom: none; }
        .feed-empty { padding: 24px; text-align: center; color: var(--ink-muted); font-size: 13.5px; }

        .badge {
            flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px;
            min-width: 74px; justify-content: center;
            padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.02em; color: #fff; white-space: nowrap;
        }
        .badge-applying { background: var(--accent); }
        .badge-applied  { background: var(--good); }
        .badge-skipped  { background: var(--ink-muted); }
        .badge-failed, .badge-error { background: var(--critical); }
        .badge-info     { background: var(--ink-secondary); }
        .badge-question { background: var(--violet); }
        .badge-login_required, .badge-stuck_question, .badge-review_filters { background: var(--warning); color: #1a1400; }
        .feed-message { flex: 1; }
        .feed-time { color: var(--ink-muted); font-size: 11.5px; white-space: nowrap; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div class="container" id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const BADGE_ICON = {
            applying: '⏳', applied: '✓', skipped: '⏭', failed: '✕', error: '✕',
            info: 'ℹ', question: '💬', login_required: '⚠', stuck_question: '⚠', review_filters: '⚠',
        };

        function Topbar() {
            return (
                <div className="topbar">
                    <div>
                        <h1>🤖 LinkedIn Auto Applier</h1>
                        <div className="sub">Live activity &amp; applied-jobs dashboard</div>
                    </div>
                    <span className="live-pill"><span className="live-dot"></span>Live</span>
                </div>
            );
        }

        function StatsBar({ log }) {
            const counts = useMemo(() => {
                const c = { applying: 0, applied: 0, skipped: 0, failed: 0 };
                for (const item of log) {
                    const k = (item.kind || '').toLowerCase();
                    if (k === 'applying') c.applying++;
                    else if (k === 'applied') c.applied++;
                    else if (k === 'skipped') c.skipped++;
                    else if (k === 'failed' || k === 'error') c.failed++;
                }
                return c;
            }, [log]);
            return (
                <div className="stats">
                    <div className="stat-tile applying"><div className="label">Applying</div><div className="value">{counts.applying}</div></div>
                    <div className="stat-tile applied"><div className="label">Applied</div><div className="value">{counts.applied}</div></div>
                    <div className="stat-tile skipped"><div className="label">Skipped</div><div className="value">{counts.skipped}</div></div>
                    <div className="stat-tile failed"><div className="label">Failed</div><div className="value">{counts.failed}</div></div>
                </div>
            );
        }

        function DecisionCard({ decision }) {
            const [sending, setSending] = useState(false);
            const respond = async (choice) => {
                setSending(true);
                await fetch(`/decision/${decision.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ choice }),
                });
            };
            return (
                <div className="decision-card">
                    <div className="label">⚠ Needs your input</div>
                    {decision.message}
                    <div>
                        {(decision.options || []).map(opt => (
                            <button key={opt} disabled={sending} onClick={() => respond(opt)}>{opt}</button>
                        ))}
                    </div>
                </div>
            );
        }

        function FeedItem({ item }) {
            const kind = (item.kind || 'info').toLowerCase();
            return (
                <div className="feed-item">
                    <span className={`badge badge-${kind}`}>{BADGE_ICON[kind] || ''} {kind}</span>
                    <span className="feed-message">{item.message}</span>
                    <span className="feed-time">{item.timestamp}</span>
                </div>
            );
        }

        const noPaddingCard = { padding: 0 };
        function LiveFeed({ data }) {
            return (
                <div className="card" style={noPaddingCard}>
                    <div className="feed">
                        {data.log.length === 0
                            ? <div className="feed-empty">Waiting for activity…</div>
                            : data.log.map((item, i) => <FeedItem key={i} item={item} />)}
                    </div>
                </div>
            );
        }

        function HistoryRow({ job, index, onMarked }) {
            const [applied, setApplied] = useState(job.Date_Applied && job.Date_Applied !== 'Pending');
            const markApplied = async () => {
                try {
                    const res = await fetch(`/applied-jobs/${job.Job_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' } });
                    if (res.ok) { setApplied(true); onMarked && onMarked(); }
                } catch (e) {}
            };
            return (
                <tr>
                    <td className="sl-column">{index + 1}</td>
                    <td><a href={job.Job_Link} target="_blank" rel="noreferrer">{job.Title}</a></td>
                    <td>{job.Company}</td>
                    <td>{job.HR_Name && job.HR_Name !== 'Unknown' ? <a href={job.HR_Link} target="_blank" rel="noreferrer">{job.HR_Name}</a> : 'N/A'}</td>
                    <td>
                        {job.External_Job_link === 'Easy Applied'
                            ? 'Easy Applied'
                            : job.External_Job_link
                                ? <a href={job.External_Job_link} target="_blank" rel="noreferrer" onClick={markApplied}>External Link</a>
                                : 'N/A'}
                    </td>
                    <td className="applied-column">{applied ? <span className="tick">✓</span> : ''}</td>
                </tr>
            );
        }

        function HistoryTable() {
            const [jobs, setJobs] = useState([]);
            const [sortAsc, setSortAsc] = useState(true);

            useEffect(() => {
                const poll = () => {
                    fetch('/applied-jobs').then(r => r.ok ? r.json() : []).then(setJobs).catch(() => {});
                };
                poll();
                const id = setInterval(poll, 3000);
                return () => clearInterval(id);
            }, []);

            const sorted = useMemo(() => {
                const copy = [...jobs];
                copy.sort((a, b) => {
                    const va = a.External_Job_link || '', vb = b.External_Job_link || '';
                    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
                });
                return copy;
            }, [jobs, sortAsc]);

            return (
                <div className="card">
                    <table>
                        <thead>
                            <tr>
                                <th className="sl-column">#</th>
                                <th>Job Title</th>
                                <th>Company</th>
                                <th>HR Contact</th>
                                <th>External Link <button className="sort-button" onClick={() => setSortAsc(!sortAsc)}>↕️</button></th>
                                <th className="applied-column">Applied</th>
                            </tr>
                        </thead>
                        <tbody>
                            {sorted.length === 0
                                ? <tr className="empty-row"><td colSpan={6}>No applications yet.</td></tr>
                                : sorted.map((job, i) => <HistoryRow key={job.Job_ID + i} job={job} index={i} />)}
                        </tbody>
                    </table>
                </div>
            );
        }

        function Dashboard() {
            const [data, setData] = useState({ log: [], pending: [] });

            useEffect(() => {
                const poll = () => fetch('/status').then(r => r.json()).then(setData).catch(() => {});
                poll();
                const id = setInterval(poll, 1000);
                return () => clearInterval(id);
            }, []);

            return (
                <div>
                    <Topbar />
                    <StatsBar log={data.log} />
                    {data.pending.map(d => <DecisionCard key={d.id} decision={d} />)}
                    <h2>🟢 Live Activity</h2>
                    <LiveFeed data={data} />
                    <h2>📋 Applied Jobs History</h2>
                    <HistoryTable />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>
